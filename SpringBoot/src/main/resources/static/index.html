<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
    <meta name="generator" content="Jekyll v4.0.1">
    <title>Signin Template · Bootstrap</title>

    <link rel="canonical" href="https://getbootstrap.com/docs/4.5/examples/sign-in/">

    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="./bootstrap-4.5.0-examples/assets/dist/css/bootstrap.css">

    <script src="./3rdlib/angular.min.js"></script><!--引入 AngularJS-->
    <script src="./3rdlib/require.js" data-main="js/main"></script>
    <script src="./index.js"></script>

    <style>
        .bd-placeholder-img {
            font-size: 1.125rem;
            text-anchor: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @media (min-width: 768px) {
            .bd-placeholder-img-lg {
                font-size: 3.5rem;
            }
        }
    </style>
    <!-- Custom styles for this template -->
    <link rel="stylesheet" href="index.css"/>
</head>
<body class="text-center" ng-app="signinApp" ng-controller="signinAppController">

<form class="form-signin">
    <img class="mb-4" src="bootstrap-4.5.0-examples/assets/brand/bootstrap-solid.svg" alt="" width="72" height="72">
    <h1 class="h3 mb-3 font-weight-normal">请登录</h1>

    <label for="inputEmail" class="sr-only">邮箱</label>
    <input type="email" id="inputEmail" class="form-control" placeholder="请输入邮箱地址" required autofocus ng-model="$scope.email">

    <label for="inputTelephone" class="sr-only">手机号</label>
    <input type="tel" id="inputTelephone" class="form-control" placeholder="请输入手机号" required ng-model="$scope.telephone">

    <label for="inputPassword" class="sr-only">密码</label>
    <input type="password" id="inputPassword" class="form-control" placeholder="请输入密码" required ng-model="$scope.password">

    <div class="checkbox mb-3">
        <label><input type="checkbox" value="remember-me"> Remember me</label>
    </div>
    <button class="btn btn-lg btn-primary btn-block" ng-click="submit($scope)">Sign in 登录</button>
    <p class="mt-5 mb-3 text-muted">&copy; 2020-2020</p>
</form>

</body>

</html>
