<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>backstage management system</title>
<!--    <script data-main="../3rdlib/main" src="../3rdlib/require.js"></script>-->
    <script src="../3rdlib/angular.js"></script>
    <script src="./bmsloader.js"></script>

    <style type="text/css">
        .tabpage {
            width: 98%;
            margin: 0 auto;
            padding: 10px;
        }
        ul {
            list-style: none;
            margin: 0;
            padding-left: 20px;
        }
        ul.tab {
            border-bottom: 1px solid #ccc;
            padding-bottom:1px;
            height: 30px;
            line-height: 30px;
            color: #696969;
        }
        ul.tab li {
            float: left;
            font-family: "微软雅黑",serif;
            cursor: pointer;
            padding: 0;


        }
        ul.tab li.li {
            padding: 0 50px 0; /*tab 宽度*/
            font-size: 13px;
            height: 30px;
            line-height: 30px;
            background:#F4F5F9;
            border-top: 1px solid #C5D0DC;
            border-left: 1px solid #C5D0DC;
            border-bottom: 1px solid #C5D0DC;

        }
        ul.tab li.current {
            border-bottom: 0;
            border-top: 2px solid #7599DE;
            font-size: 13px;
            color: #343434;
            background:#FFFFFF;

        }
        ul.tab li.li:last-child{border-right: 1px solid #C5D0DC;}
    </style>

</head>

<body ng-app="bmsApp">
    <h1>My Sample Project</h1>
    <h1>后台管理系统</h1>

    <div class="tabpage" ng-controller="bmsController">
        用户名：<input type="text" ng-model="userInfo.name">
        <h3>{{userInfo.name}}</h3>

        <ul class="tab">
            <li id="li_stage" class="li" ng-class="{'current':tabPageNum===1}" ng-click="changeTab(1)">
                <span>tab1</span>

            </li>
            <li id="li_class" class="li" ng-class="{'current':tabPageNum===2}" ng-click="changeTab(2)">
                <span>tab2</span>

            </li>
            <li id="li_photo" class="li" ng-class="{'current':tabPageNum===3}" ng-click="changeTab(3)">
                <span>tab3</span>

            </li>
        </ul>
    </div>

    <script>
        (function (window) {
            window.addEventListener("hashchange", function (e){
                console.log(11111);
                console.log(e);
            })
        })(window);

    </script>

</body>

</html>
