# Tomcat
server.port=80


# \u6570\u636E\u5E93
spring.datasource.url=jdbc:mysql://192.168.1.100:3306/JavaWeb?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=true
spring.datasource.username=root
spring.datasource.password=feng234800
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# \u70ED\u90E8\u7F72
#\u7F13\u5B58
spring.thymeleaf.cache=false
#\u5F00\u542F
spring.devtools.restart.enabled=true
#\u76D1\u542C\u76EE\u5F55
spring.devtools.restart.additional-paths=src/main/java/**,src/main/resources/**


# Quartz\u5B9A\u65F6\u4EFB\u52A1
#ID\u8BBE\u7F6E\u4E3A\u81EA\u52A8\u83B7\u53D6 \u6BCF\u4E00\u4E2A\u5FC5\u987B\u4E0D\u540C \uFF08\u6240\u6709\u8C03\u5EA6\u5668\u5B9E\u4F8B\u4E2D\u662F\u552F\u4E00\u7684\uFF09Hello World!
org.quartz.scheduler.instanceId=AUTO
#\u6307\u5B9A\u8C03\u5EA6\u7A0B\u5E8F\u7684\u4E3B\u7EBF\u7A0B\u662F\u5426\u5E94\u8BE5\u662F\u5B88\u62A4\u7EBF\u7A0B
org.quartz.scheduler.makeSchedulerThreadDaemon=true
#ThreadPool\u5B9E\u73B0\u7684\u7C7B\u540D
org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
#ThreadPool\u914D\u7F6E\u7EBF\u7A0B\u5B88\u62A4\u8FDB\u7A0B
org.quartz.threadPool.makeThreadsDaemons=true
#\u7EBF\u7A0B\u6570\u91CF
org.quartz.threadPool.threadCount=20
#\u7EBF\u7A0B\u4F18\u5148\u7EA7
org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
#StdJDBCDelegate\u8BF4\u660E\u652F\u6301\u96C6\u7FA4
org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
#quartz\u5185\u90E8\u8868\u7684\u524D\u7F00
org.quartz.jobStore.tablePrefix=QRTZ_
#\u662F\u5426\u52A0\u5165\u96C6\u7FA4
org.quartz.jobStore.isClustered=true
#\u5BB9\u8BB8\u7684\u6700\u5927\u4F5C\u4E1A\u5EF6\u957F\u65F6\u95F4
org.quartz.jobStore.misfireThreshold=25000


# \u4E0A\u4F20\u6587\u4EF6\uFF08\u5B98\u65B9\u6587\u6863\u4E2D\u641C\u7D22 multipart\uFF09\uFF1A
# maxFileSize \u662F\u5355\u4E2A\u6587\u4EF6\u5927\u5C0F
# maxRequestSize\u662F\u8BBE\u7F6E\u603B\u4E0A\u4F20\u7684\u6570\u636E\u5927\u5C0F
# \u5355\u4F4D\u53EA\u80FD\u662FMB\u548CKB\u4E24\u79CD\u7C7B\u578B\uFF0C\u5B57\u6BCD\u5927\u5C0F\u5199\u968F\u610F\uFF0C\u6570\u5B57\u662FLong\u7C7B\u578B
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Redis
# Redis\u6570\u636E\u5E93\u7D22\u5F15\uFF08\u9ED8\u8BA4\u4E3A0\uFF09
spring.redis.database=0
# Redis\u670D\u52A1\u5668\u5730\u5740
spring.redis.host=192.168.1.100
# Redis\u670D\u52A1\u5668\u8FDE\u63A5\u7AEF\u53E3
spring.redis.port=6379
# Redis\u670D\u52A1\u5668\u8FDE\u63A5\u5BC6\u7801\uFF08\u9ED8\u8BA4\u4E3A\u7A7A\uFF09
spring.redis.password=
# \u8FDE\u63A5\u6C60\u6700\u5927\u8FDE\u63A5\u6570\uFF08\u4F7F\u7528\u8D1F\u503C\u8868\u793A\u6CA1\u6709\u9650\u5236\uFF09
spring.redis.jedis.pool.max-idle=8
# \u8FDE\u63A5\u6C60\u6700\u5927\u963B\u585E\u7B49\u5F85\u65F6\u95F4\uFF08\u4F7F\u7528\u8D1F\u503C\u8868\u793A\u6CA1\u6709\u9650\u5236\uFF09
spring.redis.jedis.pool.max-wait=
# \u8FDE\u63A5\u6C60\u4E2D\u7684\u6700\u5C0F\u7A7A\u95F2\u8FDE\u63A5
spring.redis.jedis.pool.min-idle=1
# \u8FDE\u63A5\u8D85\u65F6\u65F6\u95F4\uFF08\u6BEB\u79D2\uFF09
spring.redis.timeout=1000
