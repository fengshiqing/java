<!DOCTYPE html>
<html xmlns:v-bind="http://www.w3.org/1999/xhtml" xmlns:v-on="http://www.w3.org/1999/xhtml" lang="en">
<head>
	<meta charset="UTF-8">
	<title>index</title>
    <script src="index.js"></script>
</head>

<body>

	<form action="/JavaWeb/SpringMVC/saveUser" method="get">
		<div>
            <label class="" for="username">账号</label>
		    <input id="username" type="text" name="username" value="" placeholder="邮箱/手机/用户名">
		</div>

		<div>
            <label class="" for="password">密码</label>
		    <input id="password" type="text" name="password" value="">
		</div>

        <div>
            验证码：<input type="text" name="password" value="">
        </div>

		<input type="submit" value="保存">
	</form>





    <h1>上传图片：</h1>
    <fieldset>
        <legend>图片上传</legend>
        <h4>只能上传单张10M以下的图片。支持格式：PNG、JPG、GIF</h4>
        <form action="/JavaWeb/uploadPhoto" method="post" enctype="multipart/form-data">
            选择文件：<input type="file" name="file">
            <input type="submit" value="上传">
        </form>
    </fieldset>

</body>
</html>
