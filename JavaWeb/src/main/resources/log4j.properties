#配置子logger，目的就是控制一定范围内的日志输出，比如这里的子logger是控制log包下面的所有类的日志输出，其父logger就是rootLogger
log4j.logger.log=info, Console
# true表示向上层传递，传递了就会打印多次。false不向上层传递，只打印当前自定义的这次
log4j.additivity.log=true
log4j.appender.Console=org.apache.log4j.ConsoleAppender
#不注释掉下面这行代码，日志是交叉打印的，应该是按执行的顺序打印的，加上后就是分类一起打印的，可能是有缓冲，攒够一波才打印
#log4j.appender.Console.Append = true
log4j.appender.Console.Threshold = INFO 
log4j.appender.Console.layout = org.apache.log4j.PatternLayout
log4j.appender.Console.layout.ConversionPattern =%r  %-d{yyyy-MM-dd HH:mm:ss}  [ %t:%r ] - [ %p ] %m%n


