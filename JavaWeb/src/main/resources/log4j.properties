# 配置根节点，及其输出位置。stdout用来表示控制台输出
log4j.rootLogger=INFO, stdout
log4j.Logger=INFO, stdout



#设置变量，保存路径 ${catalina.home}/logs
logDir=D:/tomcat/logs


 
# 设置 stdout 的样式
# 设置 stdout 输出到控制台
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
# 默认就是System.out，另外一个值是System.err
log4j.appender.stdout.Target=System.err
# 输出格式，org.apache.log4j.PatternLayout表示可以灵活的指定格式
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
# %d{yyyy-MM-dd HH:mm:ss.SSS}    表示输出时间，d必须小写，大括号内为日期时间的格式。默认格式为：2018-11-18 17:40:47,289
# %p    表示输出日志的级别，必须小写。%5p表示占5位，不足5位前面加空格。下面的配置都可以加数字来控制。
#            输出日志时间点的日期或时间，默认格式为ISO8601，也可以在其后指定格式，比如：%d{yyy-MM-dd HH:mm:ss }，输出类似：2002-10-18 22:10:28
# %c    表示输出日志信息所属的类的全路径名，大小写都行
# %M    表示输出方法名，必须大写
# %L    表示输出日志的行号，小写l输出源码的行号，大写L只是输出行号
# %m    表示输出具体的日志内容，必须小写
# %n    表示换行，必须小写。输出一个回车换行符，Windows平台为“rn”，Unix平台为“n” 
# %F    输出日志信息所属的类的类名
# %t    输出产生该日志事件的线程名
# %l    输出日志事件的发生位置，即输出日志信息的语句处于它所在的类的第几行
# %r    输出自应用启动到输出该日志信息所耗费的毫秒数
log4j.appender.stdout.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss.SSS}][%5p][%t][%c:%M:%L] - %m%n
#log4j.appender.stdout.layout.ConversionPattern = %r [%d][%5p][%c{3}:%L][%F][%t] - %m%n



